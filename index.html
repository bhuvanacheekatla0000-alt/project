<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cute Store</title>

<style>
    body {
        font-family: 'Poppins', sans-serif;
        margin: 0;
        background: #fff0f5;
    }

    header {
        background: #ffb6c1;
        color: white;
        padding: 15px;
        text-align: center;
        font-size: 22px;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .card {
        background: white;
        padding: 15px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 6px 15px rgba(0,0,0,0.08);
        position: relative;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card img {
        width: 100%;
        height: 170px;
        object-fit: cover;
        border-radius: 15px;
    }

    .price {
        color: #ff69b4;
        font-weight: bold;
    }

    .qty-box {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin: 10px 0;
    }

    .qty-box button {
        width: 30px;
        height: 30px;
        border: none;
        background: #ffd1dc;
        border-radius: 8px;
        cursor: pointer;
    }

    .check {
        position: absolute;
        top: 10px;
        left: 10px;
        transform: scale(1.2);
    }

    .cart-box {
        background: white;
        margin: 20px;
        padding: 15px;
        border-radius: 20px;
        box-shadow: 0 6px 15px rgba(0,0,0,0.08);
    }

    .total {
        font-weight: bold;
        margin-top: 10px;
        color: #ff69b4;
        font-size: 18px;
    }
</style>
</head>

<body>

<header>🎀 My Cute Store 🎀</header>

<script>
    let products = {
        q1: {name:"Headphones", price:1000},
        q2: {name:"Smart Watch", price:1500},
        q3: {name:"Shoes", price:2000},
        q4: {name:"Backpack", price:1200},
        q5: {name:"Smartphone", price:15000},
        q6: {name:"Bluetooth Speaker", price:1800}
    };

    function increase(id){
        let el = document.getElementById(id);
        let val = parseInt(el.innerText);
        el.innerText = val + 1;
        updateCart();
    }

    function decrease(id){
        let el = document.getElementById(id);
        let val = parseInt(el.innerText);
        if(val > 1){
            el.innerText = val - 1;
        }
        updateCart();
    }

    function updateCart(){
        let total = 0;
        let html = "";
        let found = false;

        for(let id in products){
            let qty = parseInt(document.getElementById(id).innerText);
            let checked = document.getElementById("c_"+id).checked;

            if(checked){
                found = true;
                let itemTotal = qty * products[id].price;
                total += itemTotal;

                html += `<div>💖 ${products[id].name} × ${qty} = ₹${itemTotal}</div>`;
            }
        }

        if(!found){
            html = "✨ Your cart is empty ✨";
        }

        document.getElementById("cartItems").innerHTML = html;
        document.getElementById("cartTotal").innerText = total;
    }

    window.onload = function(){
        updateCart();
    }
</script>

<div class="products">

    <!-- Headphones -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q1" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">
        <h3>Headphones</h3>
        <p class="price">₹1000</p>
        <div class="qty-box">
            <button onclick="decrease('q1')">-</button>
            <span id="q1">1</span>
            <button onclick="increase('q1')">+</button>
        </div>
    </div>

    <!-- Smart Watch -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q2" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1579586337278-3befd40fd17a?w=400">
        <h3>Smart Watch</h3>
        <p class="price">₹1500</p>
        <div class="qty-box">
            <button onclick="decrease('q2')">-</button>
            <span id="q2">1</span>
            <button onclick="increase('q2')">+</button>
        </div>
    </div>

    <!-- Shoes -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q3" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400">
        <h3>Shoes</h3>
        <p class="price">₹2000</p>
        <div class="qty-box">
            <button onclick="decrease('q3')">-</button>
            <span id="q3">1</span>
            <button onclick="increase('q3')">+</button>
        </div>
    </div>

    <!-- Backpack -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q4" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1509762774605-f07235a08f1f?w=400">
        <h3>Backpack</h3>
        <p class="price">₹1200</p>
        <div class="qty-box">
            <button onclick="decrease('q4')">-</button>
            <span id="q4">1</span>
            <button onclick="increase('q4')">+</button>
        </div>
    </div>

    <!-- Smartphone -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q5" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400">
        <h3>Smartphone</h3>
        <p class="price">₹15000</p>
        <div class="qty-box">
            <button onclick="decrease('q5')">-</button>
            <span id="q5">1</span>
            <button onclick="increase('q5')">+</button>
        </div>
    </div>

    <!-- Bluetooth Speaker -->
    <div class="card">
        <input type="checkbox" class="check" id="c_q6" onchange="updateCart()">
        <img src="https://images.unsplash.com/photo-1589003077984-894e133dabab?w=400">
        <h3>Bluetooth Speaker</h3>
        <p class="price">₹1800</p>
        <div class="qty-box">
            <button onclick="decrease('q6')">-</button>
            <span id="q6">1</span>
            <button onclick="increase('q6')">+</button>
        </div>
    </div>

</div>

<div class="cart-box">
    <h3>🛒 Your Cart</h3>
    <div id="cartItems"></div>
    <div class="total">Total: ₹<span id="cartTotal">0</span></div>
</div>

</body>
</html>
